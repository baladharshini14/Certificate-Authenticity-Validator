<!DOCTYPE html>
<html>

<head>

    <title>Edit Certificate</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

<div class="card p-4">

<h2>Edit Certificate</h2>

<form
action="/update_certificate/{{ certificate[0] }}"
method="POST">

<label>Certificate ID</label>

<input
class="form-control mb-3"
type="text"
name="certificate_id"
value="{{ certificate[1] }}"
required>

<label>Student Name</label>

<input
class="form-control mb-3"
type="text"
name="student_name"
value="{{ certificate[2] }}"
required>

<label>Course</label>

<input
class="form-control mb-3"
type="text"
name="course"
value="{{ certificate[3] }}"
required>

<label>Issue Date</label>

<input
class="form-control mb-3"
type="date"
name="issue_date"
value="{{ certificate[4] }}"
required>

<button
class="btn btn-success">
Update Certificate
</button>

<a
href="/admin"
class="btn btn-secondary">
Cancel
</a>

</form>

</div>

</div>

</body>

</html>
