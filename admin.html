<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>
</head>
<body>

<center>

<h2>Admin Dashboard</h2>

<table border="1" cellpadding="10">

<tr>
    <th>ID</th>
    <th>Certificate ID</th>
    <th>Student Name</th>
    <th>Course</th>
    <th>Issue Date</th>
</tr>

{% for cert in certificates %}
<tr>
    <td>{{ cert[0] }}</td>
    <td>{{ cert[1] }}</td>
    <td>{{ cert[2] }}</td>
    <td>{{ cert[3] }}</td>
    <td>{{ cert[4] }}</td>
</tr>
{% endfor %}

</table>

<br><br>

<a href="/dashboard">
    <button>Back to Dashboard</button>
</a>

</center>

</body>
</html>
